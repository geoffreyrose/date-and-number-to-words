name: PHP CI
permissions:
  contents: read
  pull-requests: write

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - php-version: '8.1'
            coverage: 'false'
            phpunit-version: '10'
          - php-version: '8.2'
            coverage: 'false'
            phpunit-version: '11'
          - php-version: '8.3'
            coverage: 'false'
            phpunit-version: '11'
          - php-version: '8.4'
            coverage: 'true'
            phpunit-version: '11'
          - php-version: '8.5'
            coverage: 'false'
            phpunit-version: '11'
    steps:
      - uses: actions/checkout@v6
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          ini-values: post_max_size=256M, max_execution_time=180
          extensions: mbstring, intl, calendar
          coverage: xdebug
      - name: Composer Install
        run: composer install --no-interaction --dev
      - name: Run Tests
        run: ./vendor/bin/phpunit
      - name: Codecov
        if: ${{ matrix.coverage == 'true' }}
        uses: codecov/codecov-action@v6
        with:
          files: ./clover.xml
